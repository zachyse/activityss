<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity - Home</title>

<style>
:root {
    --bg: #f4f4f4; 
    --text: #222; 
    --header-bg: #333; 
    --nav-bg: #444; 
    --section-bg: #fff;
}

body.dark {
    --bg: #121212;
    --text: #f5f5f5;
    --header-bg: #1a1a1a;
    --nav-bg: #222;
    --section-bg: #1e1e1e;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: background 0.4s ease, color 0.4s ease;
}

header {
    background: var(--header-bg);
    color: white;
    padding: 20px;
    text-align: center;
}

nav {
    background: var(--nav-bg);
    text-align: center;
    padding: 12px;
}

nav a {
    color: white;
    margin: 0 20px;
    text-decoration: none;
    font-weight: bold;
}

.toggle-btn, .home-btn {
    position: fixed;
    top: 15px;
    padding: 8px 15px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
}

.toggle-btn {
    right: 15px;
    background: #ff9800;
    color: white;
}

.home-btn {
    left: 15px;
    background: #4caf50;
    color: white;
}

.main-container {
    margin: 30px 20px;
}

#home {
    display: flex;
    align-items: center;
    gap: 25px;
    flex-wrap: wrap;
    justify-content: center;
}

#home img {
    width: 280px;
    height: 280px;
    border-radius: 12px;
    object-fit: cover;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.swap-container {
    display: flex;
    align-items: center;
    gap: 10px;
}

#swapBtn {
    background: transparent;
    border: none;
    font-size: 40px;
    cursor: pointer;
    color: gray;
}
</style>
</head>

<body>

<button class="toggle-btn" onclick="toggleDarkMode()">🌙 Dark Mode</button>
<button class="home-btn" onclick="window.location.href='index.html'">🏠 Home</button>

<header>
<h1>ACTIVITY🫩</h1>
</header>

<nav>
<a href="about.html">About</a>
<a href="games.html">Games</a>
<a href="projects.html">Projects</a>
<a href="blog.html">Blog</a>
<a href="contact.html">Contact</a>
</nav>

<div class="main-container">
<section id="home">
<div class="swap-container">
<button id="swapBtn" onclick="swapImage()">➪</button>
<img id="homeImage" src="yes@.png" alt="My Pic">
</div>
<div>
<h2>Welcome Cuh!</h2>
<p>Ginagawa mo dito?</p>
</div>
</section>
</div>

<script>
let images = ["yes@.png", "yes@@.jpg", "yes@@@.jpg", "yes@@@@.jpg"];
let currentIndex = 0;

function swapImage() {
const img = document.getElementById("homeImage");
currentIndex = (currentIndex + 1) % images.length;
img.src = images[currentIndex];
}

function toggleDarkMode() {
document.body.classList.toggle("dark");
}
</script>

</body>
</html>
